version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rockydex_postgres
    environment:
      POSTGRES_USER: rockydex_user
      POSTGRES_PASSWORD: rockydex_pass
      POSTGRES_DB: rockydex_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rockydex_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    container_name: rockydex_api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=rockydex_user
      - DB_PASSWORD=rockydex_pass
      - DB_NAME=rockydex_db
      - DB_SSLMODE=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - JWT_SECRET=production_secret_key_change_me_later
      - JWT_EXPIRY_HOURS=72
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

volumes:
  pgdata:
