name: Build Android APK on Release

on:
  release:
    types: [created]

jobs:
  build:
    name: Build and Upload APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: mobile

    steps:
      # 1. Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Java JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Set up Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5' # Uses the version we identified on your machine
          channel: 'stable'
          cache: true

      # 4. Fetch dependencies
      - name: Install dependencies
        run: flutter pub get

      # 5. Build Release APK
      - name: Build APK
        run: |
          flutter build apk --release --no-pub
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/rockydex.apk

      # 6. Upload APK to GitHub Release
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: mobile/build/app/outputs/flutter-apk/rockydex.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
